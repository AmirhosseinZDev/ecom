### DB {
spring.datasource.url=jdbc:postgresql://localhost:5432/mydb
spring.datasource.username=mydb
spring.datasource.password=mydb
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driverClassName=org.postgresql.Driver
# حداکثر زمان برای اتصال‌های بی‌استفاده به DB عملیات به میلی ثانبه
spring.datasource.hikari.idle-timeout=900000
#حداکثر اتصال‌های همزمانی که میتوان به DB عملیات داشت.
# برای عدم محدودیت می تواند از صفر یا اعداد منفی استفاده شود
spring.datasource.hikari.maximum-pool-size=200
# زمان انتظار برای دریافت اتصال به DB عملیات. پس از این زمان، خطای timeout رخ میدهد. واحد آن میلی ثانیه است.
spring.datasource.hikari.connection-timeout=6000
# حداقل اتصالهایی که میتوان به هر پارتیشن DB عملیات داشت.
spring.datasource.hikari.minimum-idle=5
#حد اکثر زمان کلی اعتبار یک connection در DB عملیاتی. (شامل زمان های idle و in-use) به میلی ثانیه
spring.datasource.hikari.max-lifetime=43200000
# حداکثر زمان انتظار برای انجام عملیات یک تراکنش
spring.transaction.default-timeout=600s
spring.jpa.open-in-view=false
