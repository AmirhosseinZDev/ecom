# Server
server:
  port: 8080

spring:
  autoconfigure:
    exclude:
      - org.redisson.spring.starter.RedissonAutoConfigurationV2
      - org.redisson.spring.starter.RedissonAutoConfigurationV4
  # DB
  datasource:
    url: jdbc:postgresql://localhost:5432/mydb
    username: ecom
    password: ECOM
    driverClassName: org.postgresql.Driver
    hikari:
      # حداکثر زمان برای اتصال‌های بی‌استفاده به DB عملیات به میلی ثانبه
      idle-timeout: 900000
      # حداکثر اتصال‌های همزمانی که میتوان به DB عملیات داشت.
      # برای عدم محدودیت می تواند از صفر یا اعداد منفی استفاده شود
      maximum-pool-size: 200
      # زمان انتظار برای دریافت اتصال به DB عملیات. پس از این زمان، خطای timeout رخ میدهد. واحد آن میلی ثانیه است.
      connection-timeout: 6000
      # حداقل اتصالهایی که میتوان به هر پارتیشن DB عملیات داشت.
      minimum-idle: 5
      # حد اکثر زمان کلی اعتبار یک connection در DB عملیاتی. (شامل زمان های idle و in-use) به میلی ثانیه
      max-lifetime: 43200000
  # حداکثر زمان انتظار برای انجام عملیات یک تراکنش
  transaction:
    default-timeout: 600s
  jpa:
    open-in-view: false
  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    # On a fresh DB, Flyway applies V1→V2 in order.
    # On an existing DB already set up by ddl-auto=update, set baseline-on-migrate=true
    # and baseline-version to the last migration already present in the DB schema.
    baseline-on-migrate: false
    out-of-order: false
  # Redis Config (used when app.cache.type=redis)
  data:
    redis:
      host: localhost
      port: 6379

# Security
security:
  jwt:
    expiration-time: 1h
    secret-key: Y2hhbmdlLW1lLWNoYW5nZS1tZS1jaGFuZ2UtbWUtY2hhbmdlLW1lLWNoYW5nZS1tZS1jaGFuZ2UtbWU=

# Cache Config
app:
  cache:
    # Available types: caffeine, redis
    type: caffeine
    caffeine:
      ttl: 10m
      max-size: 10000
  # Signup
  signup:
    ticket:
      template-id: 123456
      length: 6
      time-to-live: 2m
      block-duration: 10m
      max-failure-count: 5
    token-ttl: 10m
  # Login
  login:
    ticket:
      template-id: 123456
      length: 6
      time-to-live: 2m
      block-duration: 10m
      max-failure-count: 5
    token-ttl: 1h
  # SMS
  sms:
    api-key: 2d2Oox8IDA69FRMfCjOokDKmsgUazaNSOrZGIUxja4DcL2yc
    base-url: https://api.sms.ir
  # Shipping (postal tariff). Amounts are in Rial and may be changed freely.
  # Cost = rates[zone][upToThreshold|overThreshold], where the zone is derived from the
  # destination province relative to origin-province, and the weight tier is decided by
  # whether the order's total weight (grams) exceeds weight-threshold-gram.
  shipping:
    origin-province: TEHRAN
    weight-threshold-gram: 1000
    rates:
      INTRA_PROVINCE:
        up-to-threshold: 183000
        over-threshold: 570000
      ADJACENT_PROVINCE:
        up-to-threshold: 260000
        over-threshold: 600000
      NON_ADJACENT_PROVINCE:
        up-to-threshold: 282200
        over-threshold: 620000
    adjacency:
      TEHRAN: [ ALBORZ, QOM, SEMNAN, MAZANDARAN, MARKAZI, QAZVIN ]
      ALBORZ: [ TEHRAN, MAZANDARAN, QAZVIN, MARKAZI ]
      QOM: [ TEHRAN, MARKAZI, ISFAHAN, SEMNAN, QAZVIN ]
      SEMNAN: [ TEHRAN, MAZANDARAN, GOLESTAN, KHORASAN_NORTH, KHORASAN_RAZAVI, KHORASAN_SOUTH, ISFAHAN, QOM ]
      MAZANDARAN: [ GILAN, ALBORZ, TEHRAN, SEMNAN, GOLESTAN, QAZVIN ]
      MARKAZI: [ TEHRAN, QOM, ISFAHAN, LORESTAN, HAMADAN, QAZVIN, ALBORZ ]
      QAZVIN: [ TEHRAN, ALBORZ, MAZANDARAN, GILAN, ZANJAN, HAMADAN, MARKAZI, QOM ]
      GILAN: [ MAZANDARAN, QAZVIN, ZANJAN, ARDABIL ]
      ARDABIL: [ GILAN, ZANJAN, AZARBAIJAN_EAST ]
      ZANJAN: [ GILAN, QAZVIN, HAMADAN, KORDESTAN, AZARBAIJAN_EAST, ARDABIL ]
      AZARBAIJAN_EAST: [ ARDABIL, ZANJAN, AZARBAIJAN_WEST, KORDESTAN ]
      AZARBAIJAN_WEST: [ AZARBAIJAN_EAST, KORDESTAN, ZANJAN ]
      KORDESTAN: [ AZARBAIJAN_WEST, AZARBAIJAN_EAST, ZANJAN, HAMADAN, KERMANSHAH ]
      HAMADAN: [ ZANJAN, QAZVIN, MARKAZI, LORESTAN, KERMANSHAH, KORDESTAN ]
      KERMANSHAH: [ KORDESTAN, HAMADAN, LORESTAN, ILAM ]
      ILAM: [ KERMANSHAH, LORESTAN, KHUZESTAN ]
      LORESTAN: [ HAMADAN, MARKAZI, ISFAHAN, KHUZESTAN, ILAM, KERMANSHAH ]
      KHUZESTAN: [ ILAM, LORESTAN, ISFAHAN, CHAHARMAHAL_AND_BAKHTIARI, KOHGILUYEH_AND_BOYER_AHMAD, BUSHEHR ]
      ISFAHAN: [ QOM, MARKAZI, LORESTAN, KHUZESTAN, CHAHARMAHAL_AND_BAKHTIARI, KOHGILUYEH_AND_BOYER_AHMAD, FARS, YAZD, SEMNAN, KHORASAN_SOUTH ]
      CHAHARMAHAL_AND_BAKHTIARI: [ ISFAHAN, KHUZESTAN, KOHGILUYEH_AND_BOYER_AHMAD, FARS ]
      KOHGILUYEH_AND_BOYER_AHMAD: [ KHUZESTAN, ISFAHAN, CHAHARMAHAL_AND_BAKHTIARI, FARS, BUSHEHR ]
      FARS: [ ISFAHAN, CHAHARMAHAL_AND_BAKHTIARI, KOHGILUYEH_AND_BOYER_AHMAD, BUSHEHR, HORMOZGAN, KERMAN, YAZD ]
      BUSHEHR: [ KHUZESTAN, KOHGILUYEH_AND_BOYER_AHMAD, FARS, HORMOZGAN ]
      HORMOZGAN: [ BUSHEHR, FARS, KERMAN, SISTAN_AND_BALUCHESTAN ]
      KERMAN: [ FARS, YAZD, KHORASAN_SOUTH, SISTAN_AND_BALUCHESTAN, HORMOZGAN ]
      YAZD: [ ISFAHAN, FARS, KERMAN, KHORASAN_SOUTH, SEMNAN ]
      SISTAN_AND_BALUCHESTAN: [ KERMAN, KHORASAN_SOUTH, HORMOZGAN ]
      KHORASAN_SOUTH: [ SEMNAN, KHORASAN_RAZAVI, YAZD, KERMAN, SISTAN_AND_BALUCHESTAN, ISFAHAN ]
      KHORASAN_RAZAVI: [ KHORASAN_NORTH, KHORASAN_SOUTH, SEMNAN ]
      KHORASAN_NORTH: [ KHORASAN_RAZAVI, SEMNAN, GOLESTAN ]
