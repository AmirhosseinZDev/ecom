version: 2
updates:
  # Maven dependencies (Spring Boot, jjwt, testcontainers, etc.)
  - package-ecosystem: maven
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # The GitHub Actions used in the workflows above.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Base images used by the Dockerfile (Temurin 25 build + JRE runtime).
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
