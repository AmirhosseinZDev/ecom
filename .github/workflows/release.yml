name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# This builds the jar (attached to a GitHub Release) and publishes a Docker
# image to the GitHub Container Registry (GHCR) for that tag.
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # required to create the GitHub Release
  packages: write   # required to push the image to GHCR

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  release:
    name: Build & publish jar + image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # Full verify so a tagged build is gated on the same tests as CI.
      - name: Build and test
        run: mvn -B --no-transfer-progress -P release verify

      - name: Create GitHub Release with jar
        uses: softprops/action-gh-release@v3
        with:
          files: target/*.jar
          generate_release_notes: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag the image with the release version (without the leading "v") and latest.
      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
