name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# This builds the jar and attaches it to a GitHub Release for that tag.
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  release:
    name: Build & publish jar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Full verify so a tagged build is gated on the same tests as CI.
      - name: Build and test
        run: mvn -B --no-transfer-progress -P release verify

      - name: Create GitHub Release with jar
        uses: softprops/action-gh-release@v2
        with:
          files: target/*.jar
          generate_release_notes: true
