# =============================================================================
# Integration-test overrides (active profile: "test").
#
# Layered on top of config/application.properties (loaded for every profile by
# Spring Boot's classpath:/config/ config-data loading AND by the application's
# own EcommerceConfiguration.testPropertySourcesPlaceholderConfigurer).
#
# - Datasource points at a Testcontainers-managed PostgreSQL (the container is
#   created on first JDBC connection and kept alive for the whole JVM via
#   TC_DAEMON=true). Flyway runs the real migrations against it once.
# - The SMS provider base URL points at the in-process WireMock server.
# - Redis stays disabled, so the bundled Caffeine cache is used.
# =============================================================================
spring.datasource.url=jdbc:tc:postgresql:15-alpine:///ecom?TC_DAEMON=true
spring.datasource.username=test
spring.datasource.password=test
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
# External SMS provider -> local WireMock (port must match AbstractIntegrationITest.WIREMOCK_PORT).
app.sms.base-url=http://localhost:9576
app.sms.api-key=test-api-key
# In-memory Caffeine cache instead of Redis.
app.cache.type=caffeine
